name: Test project 
run-name: Node project set up
on: push
jobs:
  test-node:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependenciess
        run: npm ci
      - name: Run tests
        run: npx jest
  deploy:
    needs: test-node
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependenciess
        run: npm ci
      - name: Run tests
        run: npx jest 
      - name: Deploy
        run: echo "Deploying project..."